services:
  postgres-test:
    image: postgres:16-alpine
    container_name: financas-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: financas
      POSTGRES_PASSWORD: financas_test_pwd
      POSTGRES_DB: financas_test
    ports:
      - "5436:5432"
    volumes:
      - financas_postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financas -d financas_test"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  financas_postgres_test_data:
